<style>
        @keyframes crazy-spin {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(180deg) scale(1.2); }
            50% { transform: rotate(360deg) scale(0.9); }
            75% { transform: rotate(540deg) scale(1.1); }
            100% { transform: rotate(720deg) scale(1); }
        }
        @keyframes shake-tail {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            20% { transform: translateX(-10px) rotate(-10deg); }
            40% { transform: translateX(10px) rotate(10deg); }
            60% { transform: translateX(-15px) rotate(-15deg); }
            80% { transform: translateX(15px) rotate(15deg); }
        }
        @keyframes bounce-laugh {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px) scaleY(0.8); }
        }
        .animate-crazy-dance {
            animation: crazy-spin 1s linear infinite, bounce-laugh 0.4s ease-in-out infinite;
            transform-origin: center;
        }
        .animate-tail-shake {
            animation: shake-tail 0.2s linear infinite;
            transform-origin: center bottom;
        }

<script>
    // Global click to play audio
    document.addEventListener('click', (e) => {
        const audio = document.getElementById('dance-audio');
        if (audio) {
            audio.play().catch(error => console.log("Audio playback interaction required:", error));
        }
    });

    // Hover tilt effect for the glass card
    const card = document.getElementById('glass-card');
    document.addEventListener('mousemove', (e) => {
        if(window.innerWidth > 768 && card) {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        }
    });

    // Reset card on mouse leave
    document.addEventListener('mouseleave', () => {
        if(card) card.style.transform = `rotateY(0deg) rotateX(0deg)`;
    });
</script>
